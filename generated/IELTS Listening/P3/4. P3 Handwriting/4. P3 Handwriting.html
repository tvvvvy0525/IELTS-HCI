<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>IELTS Listening Practice - P3 Handwriting</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* --- Global & Layout --- */
  :root { 
    --splitter-width: 5px; 
    --splitter-color: #eaecef; 
    --bg-color: #f6f7fb;
    --panel-color: #ffffff;
    --text-color: #222;
    --border-color: #eef0f6;
    --accent-color: #3b82f6;
    --answered-bg: #e0e7ff;
    --answered-border: #a5b4fc;
    --answered-text: #3730a3;
    --correct-bg: #dcfce7;
    --correct-border: #4ade80;
    --correct-text: #15803d;
    --incorrect-bg: #fee2e2;
    --incorrect-border: #f87171;
    --incorrect-text: #b91c1c;
    --shadow: 0 8px 24px rgba(0,0,0,.12);
  }
  html.font-regular { font-size: 16px; }
  html.font-large { font-size: 18px; }
  html.font-xlarge { font-size: 20px; }

  body.dark-mode {
    --bg-color: #111827;
    --panel-color: #1f2937;
    --text-color: #d1d5db;
    --border-color: #374151;
    --splitter-color: #374151;
    --accent-color: #60a5fa;
    --answered-bg: #312e81;
    --answered-border: #4f46e5;
    --answered-text: #c7d2fe;
    --correct-bg: #14532d;
    --correct-border: #22c55e;
    --correct-text: #bbf7d0;
    --incorrect-bg: #991b1b;
    --incorrect-border: #ef4444;
    --incorrect-text: #fecaca;
  }

  html, body { height: 100%; margin: 0; overflow: hidden; }
  body, .shell { 
    background: var(--bg-color); 
    font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; 
    color: var(--text-color); 
    font-size: 1em; 
    font-weight: 400; 
  }
  .shell { display: flex; flex-direction: column; height: 100vh; }
  
  /* --- Header --- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: var(--panel-color);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
  }
  .header h1 { font-size: 1.2em; font-weight: 500; margin: 0; }
  .header-controls { display: flex; gap: 10px; }
  .header-btn {
    background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; color: var(--text-color);
  }
  #settings-panel {
    position: fixed; top: 65px; right: 20px; width: 220px; background: var(--panel-color);
    border-radius: 10px; box-shadow: var(--shadow); border: 1px solid var(--border-color);
    z-index: 1001; padding: 8px; display: none;
  }
  .settings-group { padding: 8px 0; }
  .settings-title { font-size: 0.8em; color: #6b7280; margin-bottom: 8px; padding: 0 8px; }
  .settings-options { display: flex; gap: 5px; padding: 0 8px; }
  .settings-option { flex: 1; text-align: center; padding: 6px 8px; border: 1px solid var(--border-color); background: var(--bg-color); cursor: pointer; font-size: 0.9em; border-radius: 6px; color: var(--text-color); }
  .settings-option.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
  .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.1); z-index: 1000; display: none; }
  body.dark-mode .overlay { background: rgba(0,0,0,0.4); }

  /* --- Split Pane & Page Layout --- */
  #main-shell { display: flex; flex-grow: 1; overflow: hidden; }
  #left-pane { flex: 1 1 100%; overflow-y: auto; background: var(--panel-color); transition: flex-basis 0.4s ease-in-out; }
  #splitter { width: var(--splitter-width); background: var(--splitter-color); cursor: col-resize; display: none; }
  #right-pane { flex: 0 0 0; overflow-y: auto; background: var(--bg-color); display: none; position: relative; }
  #main-shell.split-view #left-pane { flex-basis: 50%; }
  #main-shell.split-view #splitter { display: block; }
  #main-shell.split-view #right-pane { display: block; flex-basis: calc(50% - var(--splitter-width)); padding: 0 24px; }

  /* --- Sticky Header & Audio Player --- */
  #sticky-header { position: sticky; top: 0; z-index: 10; background: var(--panel-color); padding: 20px 24px 0; }
  .audio-player-wrapper { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 10px; }
  .audio-player { display: flex; align-items: center; gap: 15px; }
  .play-pause-btn { background: var(--accent-color); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .progress-container { flex-grow: 1; height: 20px; display: flex; align-items: center; cursor: pointer; }
  .progress-bar-wrapper { width: 100%; height: 8px; background-color: #e0e0e0; border-radius: 4px; position: relative; }
  body.dark-mode .progress-bar-wrapper { background-color: #4b5563; }
  .progress-bar { width: 0; height: 100%; background-color: var(--accent-color); border-radius: 4px; }
  .time-display { font-size: 0.8em; min-width: 90px; text-align: center; }
  .speed-control select { padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-color); font-size: 0.8em; }

  /* --- Content & Bottom Bar --- */
  #test-pages-container { padding: 0 24px; }
  .bottom-bar { 
    position: fixed; 
    left: 0; 
    right: 0; 
    bottom: 0; 
    height: 64px; 
    background: var(--panel-color); 
    border-top: 1px solid var(--border-color); 
    box-shadow: 0 -6px 18px rgba(0,0,0,.06); 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    gap: 16px; 
    padding: 0 16px; 
    z-index: 100; 
  }
  .bb-left, .bb-center { display: flex; align-items: center; gap: 12px; }
  .bb-center button { 
    height: 36px; 
    padding: 0 12px; 
    border: 1px solid var(--border-color); 
    border-radius: 10px; 
    background: var(--bg-color); 
    cursor: pointer; 
    color: var(--text-color); 
    font-weight: 500; 
  }
  .q-nav-container { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .q-nav-item { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-width: 32px; 
    height: 32px; 
    padding: 0 5px; 
    border-radius: 8px; 
    border: 1px solid var(--border-color); 
    background: var(--bg-color); 
    font-size: 0.9em; 
    font-weight: 500; 
    cursor: pointer; 
    transition: all 0.2s ease; 
  }
  .q-nav-item.answered { background: var(--answered-bg); border-color: var(--answered-border); color: var(--answered-text); }
  .q-nav-item.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); }
  .q-nav-item.incorrect { background: var(--incorrect-bg); border-color: var(--incorrect-border); color: var(--incorrect-text); }

  /* --- Side Panels (Notes Only) --- */
  body { transition: padding-right .25s ease; }
  body.notes-open { padding-right: 420px; }
  #notes { position: fixed; right: -420px; top: 0; bottom: 64px; width: 420px; background: var(--bg-color); border-left: 1px solid var(--border-color); transition: right .25s ease; z-index: 99; display: flex; flex-direction: column; }
  body.notes-open #notes { right: 0; }
  .side-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border-color); background: var(--panel-color); flex-shrink: 0; }
  .side-panel-header span { font-weight: 500; }
  .side-panel-close { background: transparent; border: none; font-size: 1.5em; font-weight: 300; cursor: pointer; color: var(--text-color); }
  #notes-list { overflow-y: auto; padding: 12px; flex-grow: 1; }

  /* --- Note Cards & Highlighter --- */
  .note-card { 
    background: var(--panel-color); 
    border-radius: 10px; 
    padding: 12px; 
    margin: 0 0 10px; 
    border: 1px solid var(--border-color); 
  }
  .note-quote { /* This div holds the highlighted quote */
    font-weight: 500;
    font-size: 1.1em;
    margin-bottom: 12px;
  }
  .note-actions { 
    margin-top: 8px; 
  }
  .note-actions button[data-act="del-note"] { 
    border: 1px solid var(--incorrect-border); 
    background: transparent;
    border-radius: 8px; 
    padding: 6px 12px; 
    cursor: pointer; 
    color: var(--incorrect-text);
    font-size: 0.9em;
    font-weight: 500;
  }
  .note-card textarea { 
    width: 100%; 
    min-height: 64px; 
    border: 1px solid var(--border-color); 
    border-radius: 8px; 
    padding: 8px; 
    box-sizing: border-box; 
    background: var(--bg-color); 
    color: var(--text-color); 
    font-size: 1em;
  }

  .hl { background: #fff59d; }
  body.dark-mode .hl { background: #a16207; }
  .hl-blue { background: #CEDDFE; cursor: pointer; }
  body.dark-mode .hl-blue { background: #312e81; }
  #selbar { position: absolute; background: #ffffff; color: #333; border: 1px solid #ccc; border-radius: 10px; box-shadow: var(--shadow); padding: 6px; gap: 6px; display: inline-flex; z-index: 101; }
  #selbar[hidden] { display: none; }
  #selbar button { border: 1px solid #ccc; border-radius: 8px; padding: 4px 8px; background: #f0f0f0; color: #333; cursor: pointer; font-weight: 500; }
  body.dark-mode #selbar { background: #f9fafb; color: #1f2937; border: 1px solid #9ca3af; }
  body.dark-mode #selbar button { background: #e5e7eb; color: #1f2937; border: 1px solid #9ca3af; }

  /* --- General Question Styles --- */
  .group { border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin: 24px 0; }
  .test-title, .group h4, .test-main-title { margin: 0 0 12px; font-size: 1.1em; color: var(--text-color); font-weight: 500; }
  .test-main-title { text-align: center; font-size: 1.5em; margin-bottom: 24px; }
  .group .instructions { margin-bottom: 16px; background: var(--bg-color); padding: 10px; border-radius: 8px; font-weight: 400; }
  .group p, .group li, .group label { line-height: 2; }
  b, strong { font-weight: 500; }
  label { display: block; cursor: pointer; }

  /* --- Multiple Choice Questions --- */
  .group[data-limit] label { margin-bottom: 8px; }
  .group[data-limit] input[type="checkbox"] { margin-right: 8px; }

  /* --- Single Choice Questions --- */
  input[type="radio"] { margin-right: 8px; }

  /* --- Post-Submission Results & Transcript --- */
  .results-in-page { margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 20px; }
  .results-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9em; }
  .results-table th, .results-table td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; }
  .results-table th { background: var(--bg-color); font-weight: 500; }
  .result-correct { color: var(--correct-text); font-weight: 500; }
  .result-incorrect { color: var(--incorrect-text); font-weight: 500; }
  
  #transcript-content { position: relative; }
  #transcript-content h4 { font-weight: 500; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin: 24px 0 16px 0; font-size: 1.2em; }
  #transcript-content p { margin-bottom: 0.5em; line-height: 1.7; font-weight: 400; }
  .answer-highlight { background-color: #dbeafe; padding: 2px 5px; border-radius: 4px; border-bottom: 2px solid #93c5fd; }
  body.dark-mode .answer-highlight { background-color: #1e3a8a; }
  .t-line { padding:2px 6px; border-radius:6px; transition: background-color 0.2s; }
  #close-transcript-btn { position: absolute; top: 24px; right: 10px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 50%; width: 32px; height: 32px; font-size: 1.2em; cursor: pointer; z-index: 5; }
  
  /* --- Save Toast Notification --- */
  #toast { position: fixed; right: 20px; bottom: 84px; background: #26a269; color: #fff; padding: 10px 14px; border-radius: 8px; box-shadow: var(--shadow); font-size: 0.9em; z-index: 200; opacity: 0; pointer-events: none; transform: translateY(10px); transition: opacity .2s ease, transform .2s ease; }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body class="font-regular">

<div class="shell">
  <header class="header">
    <h1>IELTS Listening Practice - P3 Handwriting</h1>
    <div class="header-controls">
        <button id="settings-btn" class="header-btn">Text Size/Color</button>
    </div>
  </header>

  <div id="settings-panel">
    <div class="settings-group">
        <div class="settings-title">Font Size</div>
        <div class="settings-options">
            <button class="settings-option active" data-size="regular">Regular</button>
            <button class="settings-option" data-size="large">Large</button>
            <button class="settings-option" data-size="xlarge">X-Large</button>
        </div>
    </div>
    <div class="settings-group">
        <div class="settings-title">Color Mode</div>
        <div class="settings-options">
            <button class="settings-option active" data-mode="light">Light</button>
            <button class="settings-option" data-mode="dark">Dark</button>
        </div>
    </div>
  </div>
  <div class="overlay"></div>

  <div id="main-shell">
    <div id="left-pane">
      <div id="sticky-header">
        <div class="audio-player-wrapper" id="audio-player-container"></div>
      </div>
      <div id="test-pages-container"></div>
    </div>
    <div id="splitter"></div>
    <div id="right-pane">
      <div id="transcript-content"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="bb-left">
    <div id="q-nav-container" class="q-nav-container"></div>
  </div>
  <div class="bb-center">
    <span id="timer">00:00</span>
    <button id="finish-btn" type="button">Finish</button>
    <button id="save-btn" type="button">Save</button>
    <button id="clear-btn" type="button">Clear</button>
    <button id="toggle-notes-btn" type="button">Notes</button>
    <button id="toggle-transcript-btn" type="button">Transcript</button>
  </div>
</div>

<div id="notes" aria-hidden="true"><div class="side-panel-header"><span>My Notes</span><button id="notes-close" type="button" class="side-panel-close">&times;</button></div><div id="notes-list"></div></div>
<div id="selbar" hidden>
    <button data-act="hl">Highlight</button>
    <button data-act="note">Note</button>
    <button data-act="del">Clear</button>
</div>
<div id="toast" role="status" aria-live="polite">Progress saved!</div>

<script>
(function() {
'use strict';

const App = {
    init() {
        this.config = CONFIG_DATA;
        this.state = { timerSecs:0, timerInterval:null, isReviewing: false, settingsOpen: false };
        this.buildLayout();
        this.cacheElements();
        this.bindEvents();
        this.loadState();
        this.AudioPlayer.init();
        this.Splitter.init();
        this.applySafeArea();
        this.startTimer();
        this.buildQuestionNav();
        this.updateNavState();
    },

    buildLayout() {
        const audioContainer = document.getElementById('audio-player-container');
        const pagesContainer = document.getElementById('test-pages-container');
        const transcriptContainer = document.getElementById('transcript-content');
        
        audioContainer.innerHTML = this.Templates.audioPlayer();
        pagesContainer.innerHTML = this.Templates.questionsPage();
        transcriptContainer.innerHTML = this.Templates.transcriptPage();
    },

    cacheElements() {
        const $ = s => document.querySelector(s);
        this.el = {
            mainShell: $('#main-shell'), leftPane: $('#left-pane'), testPagesContainer: $('#test-pages-container'),
            transcriptContent: $('#transcript-content'), notesList: $('#notes-list'),
            bottomBar: $('.bottom-bar'), timer: $('#timer'), finishBtn: $('#finish-btn'),
            saveBtn: $('#save-btn'), clearBtn: $('#clear-btn'), toggleNotesBtn: $('#toggle-notes-btn'), toggleTranscriptBtn: $('#toggle-transcript-btn'),
            notes: $('#notes'), notesCloseBtn: $('#notes-close'), selbar: $('#selbar'), 
            allPanes: [$('#left-pane'), $('#right-pane'), $('#notes')],
            toast: $('#toast'),
            settingsBtn: $('#settings-btn'), settingsPanel: $('#settings-panel'), overlay: $('.overlay'),
            qNavContainer: $('#q-nav-container')
        };
    },
    
    bindEvents() {
        document.addEventListener('input', e => this.handleFormChange(e));
        window.addEventListener('resize', () => this.applySafeArea());
        this.el.allPanes.forEach(p => p.addEventListener('scroll', () => this.highlighter.hideSelbar()));
        this.el.finishBtn.addEventListener('click', () => this.toggleFinishMode());
        this.el.saveBtn.addEventListener('click', () => this.saveState());
        this.el.clearBtn.addEventListener('click', () => this.clearAll());
        this.el.toggleNotesBtn.addEventListener('click', () => this.notes.toggle(true));
        this.el.toggleTranscriptBtn.addEventListener('click', () => {
            this.el.mainShell.classList.toggle('split-view');
            this.Transcript.buildOnce();
        });
        this.el.notesCloseBtn.addEventListener('click', () => this.notes.toggle(false));
        
        document.addEventListener('mouseup', e => this.highlighter.handleMouseUp(e));
        this.el.selbar.addEventListener('click', e => this.highlighter.handleAction(e));
        
        // Settings Panel Events
        this.el.settingsBtn.addEventListener('click', e => { e.stopPropagation(); this.toggleSettingsPanel(); });
        this.el.overlay.addEventListener('click', () => this.toggleSettingsPanel(false));
        document.addEventListener('click', e => { if (this.state.settingsOpen && !this.el.settingsPanel.contains(e.target) && !this.el.settingsBtn.contains(e.target)) this.toggleSettingsPanel(false); });
        this.el.settingsPanel.querySelectorAll('.settings-option[data-size]').forEach(btn => btn.addEventListener('click', () => { document.documentElement.className = `font-${btn.dataset.size}`; this.el.settingsPanel.querySelectorAll('.settings-option[data-size]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }));
        this.el.settingsPanel.querySelectorAll('.settings-option[data-mode]').forEach(btn => btn.addEventListener('click', () => { document.body.classList.toggle('dark-mode', btn.dataset.mode === 'dark'); this.el.settingsPanel.querySelectorAll('.settings-option[data-mode]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }));
    },

    applySafeArea() {
        const h = this.el.bottomBar.offsetHeight;
        this.el.allPanes.forEach(p => p.style.bottom = p.matches('#notes') ? `${h}px` : 'auto');
        this.el.leftPane.style.paddingBottom = `${h + 20}px`;
    },

    startTimer() { this.state.timerInterval = setInterval(() => this.tick(), 1000); },
    tick() { this.state.timerSecs++; this.updateTimerUI(); },
    updateTimerUI() { const m = String(Math.floor(this.state.timerSecs / 60)).padStart(2, '0'), s = String(this.state.timerSecs % 60).padStart(2, '0'); this.el.timer.textContent = `${m}:${s}`; },
    
    handleFormChange(e) {
        if (e.target.matches('input, textarea, select')) {
            const group = e.target.closest('[data-limit]');
            if(group){
              const limit = parseInt(group.dataset.limit,10);
              const checked = group.querySelectorAll('input:checked').length;
              group.querySelectorAll('input:not(:checked)').forEach(i => i.disabled = checked >= limit);
            }
            this.updateNavState();
        }
    },
    
    toggleSettingsPanel(forceOpen) {
        const open = forceOpen === undefined ? !this.state.settingsOpen : forceOpen;
        this.state.settingsOpen = open;
        this.el.settingsPanel.style.display = open ? 'block' : 'none';
        this.el.overlay.style.display = open ? 'block' : 'none';
    },

    notes: {
        toggle(forceOpen) { const open = forceOpen === undefined ? !document.body.classList.contains('notes-open') : forceOpen; document.body.classList.toggle('notes-open', open); },
        create(targetSpan) {
            if (!targetSpan) return; 
            const hid = targetSpan.dataset.hid || `h_${Date.now()}`; 
            targetSpan.dataset.hid = hid;
            
            const existed = App.el.notesList.querySelector(`.note-card[data-hid="${hid}"]`); 
            if (existed) { 
                App.notes.toggle(true); 
                existed.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); 
                return; 
            }

            const text = (targetSpan.textContent || '').trim(); 
            const card = document.createElement('div'); 
            card.className = 'note-card'; 
            card.dataset.hid = hid;
            
            const quoteDiv = document.createElement('div');
            quoteDiv.className = 'note-quote';
            quoteDiv.innerHTML = escapeHtml(text) || '(no text selected)';

            const textarea = document.createElement('textarea');
            textarea.placeholder = "Write note here...";

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'note-actions';

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.dataset.act = 'del-note';
            deleteBtn.textContent = 'Delete';

            deleteBtn.onclick = () => {
                const originalHighlight = document.querySelector(`[data-hid="${hid}"]`);
                if (originalHighlight) {
                    App.highlighter.unWrap(originalHighlight);
                }
                card.remove();
            };

            actionsDiv.appendChild(deleteBtn);
            card.append(quoteDiv, textarea, actionsDiv);
            App.el.notesList.prepend(card); 
            App.notes.toggle(true);
        }
    },

    highlighter: {
        unWrap(el) { if (el && el.parentNode) { const p = el.parentNode; while (el.firstChild) p.insertBefore(el.firstChild, el); p.removeChild(el); p.normalize(); } },
        hideSelbar() { if (App.el && App.el.selbar) { App.el.selbar.hidden = true; App.el.selbar.style.transform = ''; } },
        positionToolbar(rect, w) { let left = rect.left + rect.width / 2 - w / 2; App.el.selbar.style.left = `${window.scrollX + left}px`; App.el.selbar.style.top = `${window.scrollY + rect.top}px`; App.el.selbar.style.transform = 'translateY(-100%) translateY(-8px)'; },
        handleMouseUp(e) {
            if (e.target.closest('#selbar, #notes, .bottom-bar')) return;
            const clickedHl = e.target.closest('.hl,.hl-blue');
            const s = window.getSelection();
            App.el.selbar.targetElement = null;
            if (clickedHl && s.isCollapsed) {
                s.removeAllRanges();
                App.el.selbar.querySelector('[data-act="hl"]').hidden = true;
                App.el.selbar.querySelector('[data-act="note"]').hidden = false;
                App.el.selbar.querySelector('[data-act="del"]').hidden = false;
                App.el.selbar.hidden = false;
                this.positionToolbar(clickedHl.getBoundingClientRect(), App.el.selbar.offsetWidth);
                App.el.selbar.targetElement = clickedHl;
            } else if (s && !s.isCollapsed) {
                const rect = s.getRangeAt(0).getBoundingClientRect();
                if (!rect || (!rect.width && !rect.height)) return this.hideSelbar();
                App.el.selbar.querySelector('[data-act="hl"]').hidden = false;
                App.el.selbar.querySelector('[data-act="note"]').hidden = false;
                App.el.selbar.querySelector('[data-act="del"]').hidden = true;
                App.el.selbar.hidden = false;
                this.positionToolbar(rect, App.el.selbar.offsetWidth);
            } else {
                this.hideSelbar();
            }
        },
        handleAction(e) {
            const act = e.target.closest('button')?.dataset.act;
            if (!act) return;
            if (act === 'hl' || act === 'note') {
                const s = window.getSelection();
                if (!s || s.isCollapsed) return;
                const r = s.getRangeAt(0);
                const span = document.createElement('span');
                span.className = act === 'hl' ? 'hl' : 'hl-blue';
                try { r.surroundContents(span); } catch { span.appendChild(r.extractContents()); r.insertNode(span); }
                if (act === 'note') { span.dataset.hid = `h_${Date.now()}`; App.notes.create(span); }
            } else if (act === 'del' && App.el.selbar.targetElement) {
                this.unWrap(App.el.selbar.targetElement);
            }
            this.hideSelbar();
        }
    },
    
    buildQuestionNav() {
        this.el.qNavContainer.innerHTML = '';
        this.config.questionList.forEach(qNum => {
            const navItem = document.createElement('div');
            navItem.className = 'q-nav-item';
            navItem.textContent = qNum;
            navItem.dataset.qnum = qNum;
            navItem.addEventListener('click', () => {
                const firstNum = qNum.split('-')[0];
                const input = document.querySelector(`[data-q="${firstNum}"], [name="q${firstNum}"]`);
                if (input) {
                    const group = input.closest('.group');
                    if (group) group.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    input.focus();
                }
            });
            this.el.qNavContainer.appendChild(navItem);
        });
    },

    updateNavState() {
        this.config.questionList.forEach(qNum => {
            const navItem = this.el.qNavContainer.querySelector(`[data-qnum="${qNum}"]`);
            if (!navItem) return;

            let isAnswered = false;
            
            if (qNum.includes('-')) { // multiple choice
                const qKey = `q${qNum.replace('-', '_')}`;
                if (document.querySelector(`[name="${qKey}"]:checked`)) {
                    isAnswered = true;
                }
            } else {
                const qKey = `q${qNum}`;
                const radioInput = document.querySelector(`input[name="${qKey}"]:checked`);

                if (radioInput) {
                    isAnswered = true;
                }
            }
            
            navItem.classList.toggle('answered', isAnswered);
        });
    },

    saveState() {
        const answers = { text: {}, single: {}, multiple: {}, matching: {} };
        const notesText = {};

        document.querySelectorAll('input[type="radio"]:checked').forEach(i => { answers.single[i.name] = i.value; });
        document.querySelectorAll('[data-limit]').forEach(g => { const name = g.querySelector('input').name; answers.multiple[name] = [...g.querySelectorAll(':checked')].map(cb => cb.value); });
        
        this.el.notesList.querySelectorAll('.note-card').forEach(card => { const hid = card.dataset.hid; const textarea = card.querySelector('textarea'); if (hid && textarea) { notesText[hid] = textarea.value; } });
        
        const highlights = [];
        document.querySelectorAll('.hl, .hl-blue').forEach(el => {
            const className = el.className;
            const text = el.textContent;
            const parentHTML = el.parentNode.innerHTML;
            const rect = el.getBoundingClientRect();
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollLeft = document.documentElement.scrollLeft || document.body.scrollLeft;
            
            highlights.push({
                className,
                text,
                parentHTML,
                top: rect.top + scrollTop,
                left: rect.left + scrollLeft,
                hid: el.dataset.hid
            });
        });

        const settings = { fontSize: document.documentElement.className, darkMode: document.body.classList.contains('dark-mode') };

        const data = {
            answers,
            notesText,
            highlights,
            timerSecs: this.state.timerSecs,
            settings
        };
        localStorage.setItem(this.config.localStorageKey, JSON.stringify(data));
        this.toast('Progress saved!');
    },

    loadState() {
        const savedData = localStorage.getItem(this.config.localStorageKey);
        if (!savedData) return;
        try {
            const data = JSON.parse(savedData);
            
            if (data.timerSecs) { this.state.timerSecs = data.timerSecs; this.updateTimerUI(); }

            if (data.answers) {
                Object.entries(data.answers.single || {}).forEach(([n, v]) => { const i = document.querySelector(`[name="${n}"][value="${v}"]`); if(i) i.checked=true; });
                Object.entries(data.answers.multiple || {}).forEach(([n, vals]) => { vals.forEach(v => { const i = document.querySelector(`[name="${n}"][value="${v}"]`); if(i) i.checked=true; }); const firstInput = document.querySelector(`[name="${n}"]`); if (firstInput) this.handleFormChange({target: firstInput }); });
            }

            if (data.settings) {
                document.documentElement.className = data.settings.fontSize || 'font-regular';
                document.body.classList.toggle('dark-mode', data.settings.darkMode);
                this.el.settingsPanel.querySelectorAll('.settings-option[data-size]').forEach(b => b.classList.toggle('active', `font-${b.dataset.size}` === data.settings.fontSize));
                this.el.settingsPanel.querySelectorAll('.settings-option[data-mode]').forEach(b => b.classList.toggle('active', (b.dataset.mode === 'dark') === data.settings.darkMode));
            }

            this.updateNavState();
        } catch (e) {
            console.error("Failed to load state:", e);
            localStorage.removeItem(this.config.localStorageKey);
        }
    },
    
    clearAll() {
        if (!confirm('Are you sure you want to clear all progress? This will remove all answers and highlights.')) return;
        localStorage.removeItem(this.config.localStorageKey);
        window.location.reload();
    },

    toggleFinishMode() {
        if (this.state.isReviewing) {
            this.returnToTest();
        } else {
            if (confirm('Are you sure you want to finish and submit your answers?')) {
                this.finishTest();
            }
        }
    },

    finishTest() {
        this.state.isReviewing = true;
        this.el.finishBtn.textContent = 'Return to Test';
        this.el.mainShell.classList.add('split-view');
        this.Transcript.buildOnce();
        
        const resultsTableHTML = this.generateResultsTable();
        document.querySelector('.results-in-page').innerHTML = resultsTableHTML;
        
        document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
        clearInterval(this.state.timerInterval);
        this.gradeAndHighlight();
    },

    gradeAndHighlight() {
        const { answerKey } = this.config;
        const norm = v => String(v ?? '').trim().toLowerCase();
        
        this.config.questionList.forEach(qNum => {
            let isCorrect = false;
            let qKey;

            if (qNum.includes('-')) { // Multiple choice
                qKey = `q${qNum.replace('-', '_')}`;
                const userAnswers = [...document.querySelectorAll(`[name="${qKey}"]:checked`)].map(el => el.value).sort();
                const correctAnswers = answerKey.multiple[qKey].sort();
                isCorrect = userAnswers.length === correctAnswers.length && userAnswers.every((val, i) => val === correctAnswers[i]);
            } else { // Single choice
                qKey = `q${qNum}`;
                if (answerKey.single[qKey]) {
                    const userAns = document.querySelector(`[name="${qKey}"]:checked`)?.value;
                    isCorrect = norm(userAns) === norm(answerKey.single[qKey]);
                }
            }
            
            const navItem = this.el.qNavContainer.querySelector(`[data-qnum="${qNum}"]`);
            if (navItem) {
                navItem.classList.remove('answered');
                navItem.classList.add(isCorrect ? 'correct' : 'incorrect');
            }
        });
    },

    returnToTest() {
        this.state.isReviewing = false;
        this.el.finishBtn.textContent = 'Finish';
        this.el.mainShell.classList.remove('split-view');
        document.querySelector('.results-in-page').innerHTML = '';
        document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = false);
        this.startTimer();

        this.el.qNavContainer.querySelectorAll('.q-nav-item').forEach(i => i.classList.remove('correct', 'incorrect'));
        this.updateNavState();
    },

    generateResultsTable() {
        let tableHTML = '<h4>Answer Review</h4><table class="results-table"><thead><tr><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead><tbody>';
        const { answerKey } = this.config;
        const norm = v => String(v ?? '').trim().toLowerCase();

        this.config.questionList.forEach(qNumStr => {
            let userAns, correctAns, isCorrect, userAnsStr, correctAnsStr;
            let qKey;

            if (qNumStr.includes('-')) {
                qKey = `q${qNumStr.replace('-', '_')}`;
                userAns = [...document.querySelectorAll(`[name="${qKey}"]:checked`)].map(el => el.value).sort();
                correctAns = answerKey.multiple[qKey].sort();
                isCorrect = userAns.length === correctAns.length && userAns.every((v, i) => v === correctAns[i]);
                userAnsStr = userAns.length > 0 ? userAns.join(', ') : '<i>No Answer</i>';
                correctAnsStr = correctAns.join(', ');
            } else {
                qKey = `q${qNumStr}`;
                if (answerKey.single[qKey]) {
                    userAns = document.querySelector(`[name="${qKey}"]:checked`)?.value;
                    correctAns = answerKey.single[qKey];
                    isCorrect = norm(userAns) === norm(correctAns);
                }
                userAnsStr = escapeHtml(userAns) || '<i>No Answer</i>';
                correctAnsStr = escapeHtml(correctAns);
            }
            
            tableHTML += `<tr><td><b>${qNumStr}</b></td><td>${userAnsStr}</td><td>${correctAnsStr}</td><td class="${isCorrect ? 'result-correct' : 'result-incorrect'}">${isCorrect ? '✔ Correct' : '✖ Incorrect'}</td></tr>`;
        });
        return tableHTML + '</tbody></table>';
    },

    toast(msg) { this.el.toast.textContent = msg; this.el.toast.classList.add('show'); setTimeout(() => this.el.toast.classList.remove('show'), 1200); },
    
    AudioPlayer: {
        init() {
            const player = document.querySelector('.audio-player-wrapper');
            if (!player) return;
            const audio = player.querySelector('.listening-audio'); const playPauseBtn = player.querySelector('.play-pause-btn'); const progressContainer = player.querySelector('.progress-container'); const progressBar = player.querySelector('.progress-bar'); const timeDisplay = player.querySelector('.time-display'); const speedSelect = player.querySelector('.playback-speed');
            let isScrubbing = false;
            const formatTime = (t) => { if (isNaN(t)) return "00:00"; const m = Math.floor(t / 60), s = Math.floor(t % 60); return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`; };
            const updateUI = () => { if (audio.duration && !isScrubbing) { progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`; timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`; } playPauseBtn.innerHTML = audio.paused ? '&#9658;' : '&#10074;&#10074;'; };
            const scrub = (e) => { if (!isNaN(audio.duration)) { const rect = progressContainer.getBoundingClientRect(); const p = Math.min(Math.max(0, (e.clientX - rect.left) / rect.width), 1); audio.currentTime = p * audio.duration; updateUI(); } };
            playPauseBtn.addEventListener('click', () => { if (audio.paused) audio.play(); else audio.pause(); });
            speedSelect.addEventListener('change', (e) => audio.playbackRate = parseFloat(e.target.value));
            audio.addEventListener('timeupdate', updateUI); audio.addEventListener('loadedmetadata', updateUI);
            audio.addEventListener('play', updateUI); audio.addEventListener('pause', updateUI);
            progressContainer.addEventListener('mousedown', (e) => { isScrubbing = true; scrub(e); });
            document.addEventListener('mousemove', (e) => { if (isScrubbing) scrub(e); });
            document.addEventListener('mouseup', () => { isScrubbing = false; });
        }
    },
    
    Splitter: {
        init() {
            const splitter = document.getElementById('splitter'), leftPane = document.getElementById('left-pane'), rightPane = document.getElementById('right-pane');
            let isDragging = false;
            splitter.addEventListener('mousedown', () => { isDragging = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
            window.addEventListener('mouseup', () => { isDragging = false; document.body.style.cursor = 'default'; document.body.style.userSelect = 'auto'; });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const totalWidth = leftPane.parentElement.offsetWidth, newLeftWidth = e.clientX, newRightWidth = totalWidth - newLeftWidth - splitter.offsetWidth;
                if (newLeftWidth > 200 && newRightWidth > 200) { leftPane.style.flexBasis = `${newLeftWidth}px`; rightPane.style.flexBasis = `${newRightWidth}px`; }
            });
        }
    },

    Transcript: {
        buildOnce() {
            const tWrap = App.el.transcriptContent;
            if (tWrap.dataset.built) return;
            CONFIG_DATA.transcriptLines.forEach(([start, end, text]) => {
                const lineEl = document.createElement('div');
                lineEl.className = 't-line';
                const textP = document.createElement('p');
                textP.innerHTML = text;
                lineEl.appendChild(textP);
                tWrap.appendChild(lineEl);
            });
            const closeBtn = document.createElement('button');
            closeBtn.id = 'close-transcript-btn';
            closeBtn.innerHTML = '&times;';
            closeBtn.addEventListener('click', () => App.el.mainShell.classList.remove('split-view'));
            tWrap.prepend(closeBtn);
            tWrap.dataset.built = '1';
        }
    },
